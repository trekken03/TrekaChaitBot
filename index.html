<!DOCTYPE html>
<html>

<head>
    <title>TrekaChaitBot</title>
    <link rel="icon" type="image/jpg" href="bunny.jpg">
    <link rel="stylesheet" href="chatbot.css">
</head>

<body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const ANNIVERSARY_KNOWLEDGE_BASE = [
            { keywords: ['anniversary', 'when', 'first chat'], response: 'Syempre March 30, 2025! at exactly 7:43 pm, Bat makakalimutan eh kinilig pantog ko non!' },
            { keywords: ['how much do you love me?', 'so much'], response: 'I think i love you too much baby!, my love for you cannot be shaken! wow shaken?, then to infinity and beyond!' },
            { keywords: ['love me', 'do you love'], response: 'Of course baby! I love you sososo much yk?' },
            { keywords: ['favorite moment', 'Your favorite memory', 'memory'], response: 'Picking a best memory with u is quite hard yk bab? theres too many of them kasi eh!' },
            { keywords: ['what makes', 'special about'], response: 'Your one of a kind eyes, Your sweetest smile, Your kindness that makes you special, and that incredible laugh of yours that makes my day just by hearing it.' },
            { keywords: ['miss me'], response: 'I miss you baby! Can\'t wait to smell you and that kilikili of yours! hehe😉' },
            { keywords: ['sorry', 'apologize'], response: 'What\'s with the sorry? sybau(beautiful ass) beh' },
            { keywords: ['do i make you happy?', 'are you happy?'], response: 'YES! You made me the happiest baby! And i am really really thankful for you!.' },
            { keywords: ['why me', 'reason love'], response: 'AHHH this again! okay! Because you\'re kind, beautiful inside and out, you make me laugh, and you make me want to be a better person. legitness.' },
            { keywords: ['celebrate', 'anniversary plans'], response: 'I\'m sorry baby if i can\'t take you out on a date yet and ik yk why huhu but im sure in the future i can make bawi bawi hehe ily bab!' },
            { keywords: ['codm', 'played', 'games'], response: 'we played a lot of games in our first year baby!,but i must say na playing codm with you hits different! imagine playing 510+ games with you and i enjoyed all of them!' },
            { keywords: ['trust me', 'believe us'], response: 'I trust you completely baby! And I absolutely believe in us!' },
            { keywords: ['hey', 'hi'], response: 'HAIYAAAA BABYYY!' },
            { keywords: ['hello'], response: 'HELLUUU BABYYY! WHATSAPPP' },
            { keywords: ['thank you', 'thankyou'], response: 'NO! Thank you for being the most amazing baby! I\'m always grateful for you! every single day!.' },
            { keywords: ['beautiful', 'pretty', 'maganda', 'maganda ba ako?'], response: 'NAMAN! You\'re so beautiful baby! inside and out! what a melting beauty you are!.' },
            { keywords: ['proud of us?', 'proud'], response: 'I\'m so proud of you baby! on what person you have become! And of course im proud of us because we always fix things because we really want this to work out!' },
            { keywords: ['whatsuppp', 'whats up'], response: 'whatsup whatsup whatsuppppppppppppp' },
            { keywords: ['sino mas maganda', 'ex', 'sino pinaka mahal mo', 'iiwan', 'leave', 'gastos'], response: 'sybau beh' },
            { keywords: ['why did you made this', 'why chatbot', 'this chatbot'], response: 'i made it simple baby! becuase i dont have money yet to give you anything to our suppossedly anniversary, i wanna do something for you tho its a bit simple now, beh ilang oras k lang sya ginawa TT it might have a lot of flaws to it baby but its made by love💖' },
            { keywords: ['message for me?', 'do you have anything to say to me?', 'message?'], response: 'OF COURSE!!! It\'s been a year knowing you, baby, and I couldn\'t be any happier. I couldnt ask for more, Everyday with you feels like a blessing, and im so grateful for all the love, laughter, and memories weve shared. You really made me the happiest baby! and im not joking about that. You made my life brighter just being loved by you. Cheers to us and to the rest of our lives were going to spend. Im not gonna make it long baby hehe. Im always going to be your number 1 fan! I love you more than anything! 💖' },
        ];

        class AnniversaryChatbot {
            static getResponse(userInput) {
                const input = userInput.toLowerCase().trim();
                if (!input) return 'Ask me anything, my baby!';

                for (let item of ANNIVERSARY_KNOWLEDGE_BASE) {
                    if (item.keywords.some(keyword => input.includes(keyword))) {
                        return item.response;
                    }
                }

                return this.getHelpMessage();
            }

            static getHelpMessage() {
                return `Hmm, I didn't understand that baby. But here's what I know about:\n\n` +
                    `- Our first chat\n` +
                    `- Do you love me?\n` +
                    `- Your favorite memory\n` +
                    `- What makes me special?\n` +
                    `- Do you miss me?\n` +
                    `- Games we played together\n` +
                    `- Do you trust me?\n` +
                    `- How much do you love me?\n` +
                    `- Greetings (hi, hello, hey)\n` +
                    `- Thankyou baby\n` +
                    `- Maganda ba ako?\n` +
                    `- Are you proud of me?\n` +
                    `- Do i make you happy?\n` +
                    `- Why chatbot\n` +
                    `- Message for you\n` +
                    `Try asking me about any of these!`;
            }
        }

        function LoadingDots() {
            const [dots, setDots] = useState('');

            useEffect(() => {
                const interval = setInterval(() => {
                    setDots(prev => {
                        if (prev === '') return '.';
                        if (prev === '.') return '..';
                        if (prev === '..') return '...';
                        return '';
                    });
                }, 400);

                return () => clearInterval(interval);
            }, []);

            return <span>typing{dots}</span>;
        }

        function ChatMessage({ message, sender, isLoading }) {
            const imagePath = sender === 'robot' ? 'me.jpg' : 'baby.jpg';

            return (
                <div className={`chat-message-${sender}`}>
                    {sender === 'robot' && (
                        <img className="chat-message-profile" src={imagePath} alt="chatbot" />
                    )}
                    <div className="chat-message-content" style={{ whiteSpace: 'pre-wrap' }}>
                        {isLoading ? <LoadingDots /> : message}
                    </div>
                    {sender === 'user' && (
                        <img className="chat-message-profile" src={imagePath} alt="user" />
                    )}
                </div>
            );
        }

        function ChatMessages({ chatMessages }) {
            const chatMessagesRef = useRef(null);
            useEffect(() => {
                if (chatMessagesRef.current) {
                    chatMessagesRef.current.scrollTop = chatMessagesRef.current.scrollHeight;
                }
            }, [chatMessages]);
            return (
                <div className="chat-message-container" ref={chatMessagesRef}>
                    {chatMessages.map((msg) => (
                        <ChatMessage
                            key={msg.id}
                            message={msg.message}
                            sender={msg.sender}
                            isLoading={msg.isLoading}
                        />
                    ))}
                </div>
            );
        }

        function ChatInput({ chatMessages, setChatMessages, isLoading, onFirstMessage }) {
            const [inputText, setInputText] = useState('');

            const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            const sendMessage = async () => {
                if (!inputText.trim() || isLoading) return;

                onFirstMessage();

                const userMessage = inputText;

                const newMessages = [
                    ...chatMessages,
                    { message: userMessage, sender: 'user', id: Date.now(), isLoading: false }
                ];

                const loadingId = Date.now() + 1;
                newMessages.push({
                    message: '',
                    sender: 'robot',
                    id: loadingId,
                    isLoading: true
                });

                setChatMessages(newMessages);
                setInputText('');

                await delay(800);

                const response = AnniversaryChatbot.getResponse(userMessage);

                setChatMessages(prev =>
                    prev.map(msg =>
                        msg.id === loadingId
                            ? { ...msg, message: response, isLoading: false }
                            : msg
                    )
                );
            };

            function handleKeyDown(e) {
                if (e.key === 'Enter' && !isLoading) sendMessage();
                if (e.key === 'Escape') setInputText('');
            }

            return (
                <div className="send-input-container">
                    <input
                        type="text"
                        placeholder="Hello my takarachai! ask me a quesion hehe...."
                        className="send-input"
                        value={inputText}
                        onChange={(e) => setInputText(e.target.value)}
                        onKeyDown={handleKeyDown}
                        disabled={isLoading}
                    />
                    <button
                        className="send-button"
                        onClick={sendMessage}
                        disabled={isLoading}
                    >
                        {isLoading ? 'Loading...' : 'Send'}
                    </button>
                </div>
            );
        }

        function App() {
            const [chatMessages, setChatMessages] = useState([
                { message: 'Happy 1 Year of being together baby! ask me a question!', sender: 'robot', id: 1, isLoading: false }
            ]);

            const audioRef = useRef(null);
            const musicStarted = useRef(false);
            const [isMuted, setIsMuted] = useState(false);

            const startMusic = () => {
                if (!musicStarted.current && audioRef.current) {
                    audioRef.current.play();
                    musicStarted.current = true;
                }
            };

            const toggleMute = () => {
                if (audioRef.current) {
                    audioRef.current.muted = !isMuted;
                    setIsMuted(!isMuted);
                }
            };

            const isLoading = chatMessages.some(msg => msg.isLoading);

            return (
                <div className="app-container">
                    <audio ref={audioRef} loop src="song.mp3" />

                    <h1 className="app-title">TrekaChaitBot</h1>




                    <ChatMessages chatMessages={chatMessages} />
                    <ChatInput
                        chatMessages={chatMessages}
                        setChatMessages={setChatMessages}
                        isLoading={isLoading}
                        onFirstMessage={startMusic}
                    />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
